    <h1 style="font-size: 1.6rem; margin-bottom: 24px;">問題集（ランダム出題）</h1>

  <script src="../../js/supabase-client.js"></script>
  <script src="../../js/auth-guard.js"></script>
  <script src="../../js/quiz.js"></script>
  <script>
    // Wait for Supabase to be ready, then load questions from API
    function onReady(fn) {
      if (window.supabaseClient) { fn(); } else { window.addEventListener('supabaseReady', fn); }
    }
    onReady(function () {
      var quiz = new Quiz('quiz-container');
      quiz.loadFromSupabase({ exam: 'az-305', shuffle: true });
    });
  </script>
