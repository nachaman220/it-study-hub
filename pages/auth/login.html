<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <title>ログイン - IT Study Hub</title>
  <link rel="stylesheet" href="../../css/style.css">
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <style>
    .auth-container {
      max-width: 820px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    .auth-card {
      background: #eef2f7;
      border-radius: 4px;
      padding: 0;
    }
    .auth-title {
      background: #3f4a9e;
      color: #fff;
      padding: 18px 28px;
      font-size: 1.3rem;
      font-weight: 700;
      border-radius: 4px 4px 0 0;
      border: none;
    }
    .auth-body {
      padding: 28px 32px;
    }
    .auth-notes {
      margin-bottom: 24px;
      font-size: 0.9rem;
      color: #333;
      line-height: 1.8;
    }
    .auth-notes a {
      color: #d35400;
      font-weight: 600;
    }
    .form-group {
      margin-bottom: 18px;
    }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #333;
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #d0d0d0;
      border-radius: 4px;
      font-size: 0.95rem;
      outline: none;
      background: #f0f4ff;
      box-sizing: border-box;
    }
    .form-group input:focus {
      border-color: #3f4a9e;
      box-shadow: 0 0 0 2px rgba(63, 74, 158, 0.15);
    }
    .remember-me {
      margin-bottom: 20px;
      font-size: 0.85rem;
    }
    .remember-me label {
      cursor: pointer;
    }
    .captcha-box {
      margin-bottom: 20px;
    }
    .auth-submit {
      width: 100%;
      padding: 12px;
      background: #e0e0e0;
      color: #333;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .auth-submit:hover {
      background: #d0d0d0;
    }
    .auth-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .auth-error {
      display: none;
      background: #fce4ec;
      color: #d13438;
      border: 1px solid #f5b7b1;
      border-radius: 4px;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-bottom: 16px;
      line-height: 1.5;
    }
    .auth-links {
      margin-top: 20px;
      font-size: 0.85rem;
      line-height: 2;
    }
    .auth-links a {
      color: #0078d4;
      font-weight: 600;
      display: block;
    }
    .account-info dt {
      font-weight: 700;
      margin-top: 16px;
    }
    .account-info dd {
      margin-left: 0;
      margin-bottom: 4px;
    }
  </style>
</head>
<body data-access="free">
  <header class="site-header">
    <h1><a href="../../index.html">IT Study Hub</a></h1>
  </header>

  <div class="auth-container">
    <div class="auth-card">
      <h2 class="auth-title">ログイン</h2>
      <div class="auth-body">
        <div class="auth-notes">
          <p>* 会員アカウントを所有していない方は、まずは簡単な<a href="register.html">無料会員登録</a>することで、無期限に模擬問題集をお試しいただくことが可能です。</p>
          <p>* アカウント毎の同時ログイン数は"1"となっています。新しくログインされた場合、古い場所(ブラウザ)から自動的にログアウトされます。</p>
        </div>

        <!-- Login form (shown when not logged in) -->
        <div id="login-section">
          <div id="login-error" class="auth-error"></div>
          <form id="login-form" autocomplete="on">
            <div class="form-group">
              <label for="login-email">メールアドレス</label>
              <input type="email" id="login-email" name="email" required placeholder="example@email.com" autocomplete="email">
            </div>
            <div class="form-group">
              <label for="login-password">パスワード</label>
              <input type="password" id="login-password" name="password" required placeholder="パスワード" autocomplete="current-password">
            </div>
            <div class="remember-me">
              <label><input type="checkbox" id="remember-check"> ログイン情報を保存</label>
            </div>
            <div class="captcha-box">
              <div class="cf-turnstile" data-sitekey="0x4AAAAAAC3N9mssUW5otxCX" data-callback="onTurnstileSuccess" data-expired-callback="onTurnstileExpired"></div>
            </div>
            <button type="submit" class="auth-submit" id="login-submit">Log In</button>
          </form>
          <div class="auth-links">
            <a href="register.html">無料会員登録</a>
          </div>
        </div>

        <!-- Account info (shown when logged in) -->
        <div id="account-section" style="display:none;">
          <dl class="account-info">
            <dt>ログイン中:</dt>
            <dd id="account-username"></dd>
            <dt>アカウント状態</dt>
            <dd id="account-status"></dd>
            <dt>メンバーシップ</dt>
            <dd id="account-membership"></dd>
          </dl>
          <div style="margin-top:24px;">
            <a href="mypage.html" style="color:#0078d4;font-weight:600;">プロフィールを編集</a><br>
            <a href="#" id="logout-link" style="color:#0078d4;font-weight:600;">ログアウト</a>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="../../js/admin-toggle.js"></script>
  <script src="../../js/copy-protect.js"></script>
  <script src="../../js/supabase-client.js"></script>
  <script src="../../js/auth-guard.js"></script>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var rawRedirect = params.get('redirect') || '../../index.html';
      var redirectUrl = '../../index.html';
      try {
        var url = new URL(rawRedirect, window.location.origin);
        if (url.origin === window.location.origin) {
          redirectUrl = rawRedirect;
        }
      } catch (e) {
        if (!rawRedirect.startsWith('//') && !rawRedirect.match(/^https?:/i)) {
          redirectUrl = rawRedirect;
        }
      }

      function showError(msg) {
        var el = document.getElementById('login-error');
        el.textContent = msg;
        el.style.display = 'block';
      }
      function hideError() {
        document.getElementById('login-error').style.display = 'none';
      }

      function onReady(fn) {
        if (window.supabaseClient) { fn(); } else { window.addEventListener('supabaseReady', fn); }
      }

      onReady(function () {
        window.getSession().then(async function (session) {
          if (session) {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('account-section').style.display = 'block';

            var user = session.user;
            var username = (user.user_metadata && user.user_metadata.username) || user.email;
            document.getElementById('account-username').textContent = username;
            document.getElementById('account-status').textContent = '有効';

            var sub = await window.getSubscriptionStatus();
            if (sub && sub.status === 'active') {
              document.getElementById('account-membership').textContent = sub.plan || 'プレミアム会員';
            } else {
              document.getElementById('account-membership').textContent = '無料会員';
            }

            document.getElementById('logout-link').addEventListener('click', function (e) {
              e.preventDefault();
              window.signOut();
            });
          }
        });
      });

      // Login form
      document.getElementById('login-form').addEventListener('submit', function (e) {
        e.preventDefault();
        hideError();

        var turnstileResponse = document.querySelector('[name="cf-turnstile-response"]');
        if (!turnstileResponse || !turnstileResponse.value) {
          showError('CAPTCHA認証を完了してください。');
          return;
        }

        var email = document.getElementById('login-email').value.trim();
        var password = document.getElementById('login-password').value;
        var btn = document.getElementById('login-submit');
        btn.disabled = true;
        btn.textContent = 'ログイン中...';

        function doLogin() {
          if (!window.supabaseClient) {
            setTimeout(doLogin, 200);
            return;
          }
          window.supabaseClient.auth.signInWithPassword({ email: email, password: password })
            .then(function (result) {
              btn.disabled = false;
              btn.textContent = 'Log In';
              if (result.error) {
                showError(result.error.message || 'ログインに失敗しました');
              } else {
                // Set session token for concurrent login control
                var sessionToken = crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).substr(2);
                localStorage.setItem('session_token', sessionToken);
                window.supabaseClient.auth.updateUser({
                  data: { session_token: sessionToken }
                }).then(function () {
                  window.location.href = redirectUrl;
                });
              }
            })
            .catch(function (err) {
              btn.disabled = false;
              btn.textContent = 'Log In';
              showError('エラーが発生しました: ' + err.message);
            });
        }
        doLogin();
      });
    })();
  </script>

  <footer style="background: #f7f9fb; border-top: 1px solid #e0e0e0; padding: 20px 48px; margin-top: 40px; text-align: center; font-size: 0.85rem; color: #888;">
    <a href="../../pages/legal/tokushoho.html" style="color: #0078d4; margin: 0 12px;">特定商取引法に基づく表記</a>
    <a href="../../pages/legal/privacy.html" style="color: #0078d4; margin: 0 12px;">プライバシーポリシー</a>
    <a href="../../pages/legal/terms.html" style="color: #0078d4; margin: 0 12px;">利用規約</a>
    <p style="margin-top: 8px;">&copy; 2026 IT Study Hub</p>
  </footer>
</body>
</html>
